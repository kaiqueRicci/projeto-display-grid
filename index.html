<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/index.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital@0;1&display=swap" rel="stylesheet">
  <title>Display Grid</title>
</head>

<body>
    <header class="container">
        <nav id="primary" class="grid grid-flow-column">
          <div>
              <img src="./assets/icons/List.svg">
              <strong>Menu</strong>
          </div>

          <div>
              <img src="./assets/Logo.svg">
          </div>

          <div>
              <strong>Buscar</strong>
              <img src="./assets/icons/MagnifyingGlass.svg">
          </div>
        </nav>


        <nav id="secondary" class="grid grid-flow-column">
          <a href="#">Inteligência Artificial</a>
          <a href="#">Blockchain</a>
          <a href="#">Hologramas</a>
          <a href="#">Internet</a>
          <a href="#">Vestíveis</a>
          <a href="#">Realidade Aumentada </a>
          <a href="#">Realidade  Virtual</a>
        </nav> 
    </header>

    <main class="grid container">
          <section id="futured" class="grid grid-flow-column gap-16">

              <figure class="card">
                  <img src="./assets/images/Image 01.png">

                  <figcaption>
                        <span class="content-tag">robótica</span>
                        <h2 class="text-2xl">
                            Robôs domésticos começam a ser adotados para tarefas diárias, prometendo mais conforto e eficiência nas residências.
                        </h2>
                  </figcaption>
              </figure>

              <div class="grid grid-column-2 gap-16">
                <div>
                    <img src="./assets/images/Image 02.png">
                </div>

                <div>
                    <img src="./assets/images/Image 03.png">
                </div>

                <div>
                    <img src="./assets/images/Image 04.png">
                </div>

                <div>
                    <img src="./assets/images/Image 05.png">
                </div>
              </div>
          </section>
    </main>
</body>

</html>
